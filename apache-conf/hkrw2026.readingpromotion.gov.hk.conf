# ============================================================================
# Frontend Apache Configuration with Cloudflare Origin CA
# Domain: hkrw2026.readingpromotion.gov.hk
# Port: 3000 (Nuxt.js frontend)
# ============================================================================

# HTTP - Redirect to HTTPS (Cloudflare will handle this, but good for direct access)
<VirtualHost *:80>
    ServerName hkrw2026.readingpromotion.gov.hk
    
    # If accessed directly (not through Cloudflare), redirect to HTTPS
    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} !https
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/hkrw-frontend-error.log
    CustomLog ${APACHE_LOG_DIR}/hkrw-frontend-access.log combined
</VirtualHost>

# ============================================================================
# HTTPS Configuration with Cloudflare Origin CA Certificate
# ============================================================================
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName hkrw2026.readingpromotion.gov.hk
    DocumentRoot /var/www/html

    # SSL Configuration - Cloudflare Origin CA
    SSLEngine on
    SSLCertificateFile /etc/ssl/cloudflare/origin-cert.pem
    SSLCertificateKeyFile /etc/ssl/cloudflare/origin-key.pem
    
    # Cloudflare Origin CA doesn't need SSLCertificateChainFile
    # The certificate is already trusted by Cloudflare

    # Modern SSL Configuration
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder on
    SSLCompression off

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/hkrw-frontend-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/hkrw-frontend-ssl-access.log combined

    # Proxy Configuration for Nuxt.js Frontend
    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # WebSocket Support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://localhost:3000/$1" [P,L]

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Get real client IP from Cloudflare
    RemoteIPHeader CF-Connecting-IP
    RemoteIPInternalProxy 173.245.48.0/20
    RemoteIPInternalProxy 103.21.244.0/22
    RemoteIPInternalProxy 103.22.200.0/22
    RemoteIPInternalProxy 103.31.4.0/22
    RemoteIPInternalProxy 141.101.64.0/18
    RemoteIPInternalProxy 108.162.192.0/18
    RemoteIPInternalProxy 190.93.240.0/20
    RemoteIPInternalProxy 188.114.96.0/20
    RemoteIPInternalProxy 197.234.240.0/22
    RemoteIPInternalProxy 198.41.128.0/17
    RemoteIPInternalProxy 162.158.0.0/15
    RemoteIPInternalProxy 104.16.0.0/13
    RemoteIPInternalProxy 104.24.0.0/14
    RemoteIPInternalProxy 172.64.0.0/13
    RemoteIPInternalProxy 131.0.72.0/22
    RemoteIPInternalProxy 2400:cb00::/32
    RemoteIPInternalProxy 2606:4700::/32
    RemoteIPInternalProxy 2803:f800::/32
    RemoteIPInternalProxy 2405:b500::/32
    RemoteIPInternalProxy 2405:8100::/32
    RemoteIPInternalProxy 2a06:98c0::/29
    RemoteIPInternalProxy 2c0f:f248::/32

    # Enable compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
    </IfModule>
</VirtualHost>
</IfModule>
